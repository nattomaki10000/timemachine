<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIME MACHINE SYSTEM</title>
    <style>
        :root {
            --neon-green: #00ff66;
            --neon-red: #ff3333;
            --neon-blue: #00d2ff;
            --neon-amber: #ffaa00;
            --dark-bg: #0a0e14;
            --panel-bg: rgba(16, 24, 36, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 255, 102, 0.1) 0%, transparent 80%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.1), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 100%, 100% 4px, 6px 100%;
            transition: background-color 0.3s ease;
        }

        /* === 【新設】時空改変ノイズ：コマンド入力後に画面全体がガクつく === */
        body.time-hacked-state {
            background-color: #071410 !important;
            animation: body-glitch 0.3s infinite, HueShift 2s infinite;
        }

        body.analyzing-state {
            background-color: #120c00 !important;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 170, 0, 0.15) 0%, transparent 80%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            animation: pulse-amber 1s infinite alternate, body-glitch 4s infinite;
        }

        body.error-state {
            background-color: #1a0000 !important;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 51, 51, 0.15) 0%, transparent 80%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            animation: body-glitch 0.5s infinite;
        }

        .system-clock {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-align: right;
            color: var(--neon-blue);
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.6);
            opacity: 0.9;
        }

        /* === 【新設】時空改変時の時計ノイズ === */
        body.time-hacked-state .system-clock {
            animation: text-glitch 0.5s infinite;
            color: #ff00ff;
        }

        .container {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        /* 時空改変時はパネルの影も怪しく光る */
        body.time-hacked-state .container {
            border-color: #ff00ff !important;
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.5) !important;
        }

        .container.analyzing-panel {
            border-color: var(--neon-amber) !important;
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.5) !important;
        }

        .container.error-panel {
            border-color: var(--neon-red) !important;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.6) !important;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-shadow: 0 0 8px var(--neon-green);
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 102, 0.5);
            border-radius: 6px;
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 4px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px 30px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            width: 100%;
        }

        button:hover {
            background: var(--neon-green);
            color: var(--dark-bg);
            box-shadow: 0 0 15px var(--neon-green);
            font-weight: bold;
        }

        button.btn-retry {
            border-color: var(--neon-red);
            color: var(--neon-red);
            margin-top: 20px;
        }

        button.btn-retry:hover {
            background: var(--neon-red);
            color: #fff;
            box-shadow: 0 0 15px var(--neon-red);
        }

        .screen {
            display: none;
        }
        .screen.active {
            display: block;
            animation: fadeIn 0.4s ease forwards;
        }

        .analyzing-title {
            color: var(--neon-amber);
            text-shadow: 0 0 10px var(--neon-amber);
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 2px;
            animation: text-glitch 3s infinite;
        }

        .scan-bar-container {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-amber);
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .scan-bar {
            height: 100%;
            background: var(--neon-amber);
            box-shadow: 0 0 10px var(--neon-amber);
            width: 0%;
            transition: width 0.05s ease-out;
        }

        .percentage {
            font-size: 2rem;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-amber);
            margin-bottom: 10px;
        }

        .error-title {
            color: var(--neon-red);
            text-shadow: 0 0 10px var(--neon-red);
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 2px;
            animation: blink 0.4s infinite, text-glitch 1s infinite;
        }

        .error-details {
            color: #ffcccc;
            font-size: 0.85rem;
            line-height: 1.6;
            background: rgba(255, 0, 0, 0.1);
            border: 1px dashed var(--neon-red);
            padding: 15px;
            text-align: left;
            margin-bottom: 20px;
        }

        .success-title {
            color: #fff;
            text-shadow: 0 0 15px var(--neon-green), 0 0 30px var(--neon-green);
            font-size: 1.8rem;
            margin-bottom: 20px;
            animation: blink 1.2s infinite;
        }

        .success-msg {
            word-break: keep-all;
            overflow-wrap: break-word;
            display: inline-block;
            margin: 1em 0;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            text-align: left;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .status-item {
            border: 1px solid rgba(0, 255, 102, 0.3);
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
        }

        .label { color: rgba(0, 255, 102, 0.7); }
        .value { color: #fff; font-weight: bold; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes pulse-amber {
            from { background-color: #0c0800; }
            to { background-color: #1a1100; }
        }

        @keyframes text-glitch {
            0%, 85%, 89%, 93%, 100% {
                transform: translate(0, 0) skew(0deg);
                filter: hue-rotate(0deg);
                text-shadow: 0 0 10px currentColor;
            }
            86% {
                transform: translate(-4px, 2px) skew(-5deg);
                filter: hue-rotate(90deg);
                text-shadow: 3px -2px var(--neon-blue), -3px 2px var(--neon-red);
            }
            88% {
                transform: translate(3px, -2px) skew(3deg);
                text-shadow: -3px 3px var(--neon-blue), 3px -2px var(--neon-red);
            }
            90% {
                transform: translate(-2px, -1px) skew(2deg);
                filter: hue-rotate(-50deg);
            }
            92% {
                transform: translate(4px, 3px) skew(-3deg);
                text-shadow: 3px 2px var(--neon-amber), -3px -2px var(--neon-blue);
            }
        }

        @keyframes body-glitch {
            0%, 92%, 96%, 100% { transform: translate(0, 0); }
            93% { transform: translate(-3px, 2px); filter: brightness(1.2); }
            95% { transform: translate(3px, -2px); }
            97% { transform: translate(-2px, -3px); filter: contrast(1.5); }
        }

        @keyframes HueShift {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(30deg); }
        }
    </style>
</head>
<body>

    <div class="system-clock">
        SYS_TIME: <span id="sys-date">----/--/--</span> <span id="sys-time">--:--:--</span>
    </div>

    <div class="container" id="panel">
        
        <div id="lock-screen" class="screen active">
            <h1>Time Machine<br><span style="font-size: 0.9rem; color: #fff;">コア起動システム</span></h1>
            <div class="input-group">
                <input type="text" id="password" placeholder="ENTER CODE" autocomplete="off">
            </div>
            <button onclick="startAnalysis()">システム解除</button>
        </div>

        <div id="analyzing-screen" class="screen">
            <div class="analyzing-title">CODE ANALYZING...</div>
            <div class="percentage" id="percent-text">0%</div>
            <div class="scan-bar-container">
                <div class="scan-bar" id="scan-progress"></div>
            </div>
            <div style="font-size: 0.8rem; color: var(--neon-amber); letter-spacing: 1px;">
                タイムコアへの同調率を計算中...
            </div>
        </div>

        <div id="error-screen" class="screen">
            <div class="error-title">SYSTEM FAILURE</div>
            <div class="error-details">
                [CRITICAL ERROR]<br>
                CODE: INVALID_TIME_KEY<br>
                STATUS: TEMPORARY LOCKED<br>
                時空連続体への干渉に失敗しました。
            </div>
            <button class="btn-retry" onclick="resetSystem()">システム再起動 (RETRY)</button>
        </div>

        <div id="success-screen" class="screen">
            <div class="success-title">UNLOCK SUCCESS</div>
            <p class="success-msg">時空連続体へのアクセスが承認されました。</p>
            
            <div class="status-grid">
                <div class="status-item"><span class="label">STATUS:</span><br><span class="value" style="color: #00ff66;">READY</span></div>
                <div class="status-item"><span class="label">DRIVE:</span><br><span class="value">ONLINE</span></div>
                <div class="status-item"><span class="label">DATE:</span><br><span class="value" id="success-date">----/--/--</span></div>
                <div class="status-item"><span class="label">TIME:</span><br><span class="value" id="success-time">--:--:--</span></div>
            </div>
        </div>

    </div>

    <script>
        const ENCRYPTED_PASSWORD = [50, 48, 50, 54]; 

        const audioSuccess = new Audio('success.m4a');
        const audioError = new Audio('error.m4a');

        // === 時空改変管理用の変数 ===
        let isTimeHacked = false;       // コマンドで時刻が書き換えられたか
        let isTimeRunning = true;       // 時計が動いているか
        let customTargetDate = null;    // 書き換えられたターゲット日時(Dateオブジェクト)

        // 時計描画用関数
        function renderClock(targetDate) {
            const yyyy = targetDate.getFullYear();
            const mm = String(targetDate.getMonth() + 1).padStart(2, '0');
            const dd = String(targetDate.getDate()).padStart(2, '0');
            const dateStr = `${yyyy}/${mm}/${dd}`;
            
            const hh = String(targetDate.getHours()).padStart(2, '0');
            const min = String(targetDate.getMinutes()).padStart(2, '0');
            const ss = String(targetDate.getSeconds()).padStart(2, '0');
            const timeStr = `${hh}:${min}:${ss}`;

            document.getElementById('sys-date').textContent = dateStr;
            document.getElementById('sys-time').textContent = timeStr;

            const successDate = document.getElementById('success-date');
            const successTime = document.getElementById('success-time');
            if (successDate && successTime) {
                successDate.textContent = dateStr;
                successTime.textContent = timeStr;
            }
        }

        // 毎秒呼び出されるメインクロック処理
        function updateClock() {
            if (!isTimeRunning) {
                // 時計停止状態なら表示更新処理をスキップ（止まったままにする）
                return;
            }

            if (isTimeHacked && customTargetDate) {
                // ハックが成功して動き出すフェーズ：保持している仮想時刻を1秒進めて描画
                customTargetDate.setSeconds(customTargetDate.getSeconds() + 1);
                renderClock(customTargetDate);
            } else {
                // 通常状態：現在時刻を描画
                const now = new Date();
                renderClock(now);
            }
        }
        setInterval(updateClock, 1000);
        updateClock();


        // === 【新設】隠しコマンドイベントリスナー (Ctrl + Alt + Shift + C) ===
        window.addEventListener('keydown', function(e) {
            // Ctrl, Alt, Shift がすべて押され、かつキーが 'c' または 'C' の場合
            if (e.ctrlKey && e.altKey && e.shiftKey && (e.key === 'c' || e.key === 'C')) {
                e.preventDefault();

                const input = prompt("【時空連続体干渉プロトコル】\n設定したい日時を入力してください:\n(フォーマット例: 1955/11/12 22:04:00)");
                
                if (input) {
                    const parsedDate = new Date(input);
                    // 正しい日時形式かバリデーション
                    if (!isNaN(parsedDate.getTime())) {
                        customTargetDate = parsedDate;
                        isTimeHacked = true;
                        isTimeRunning = false; // 時計をピタッと停止させる

                        // 画面全体に時空改変ノイズ用クラスを付与
                        document.body.classList.add('time-hacked-state');
                        
                        // 停止した日時を即時反映
                        renderClock(customTargetDate);
                    } else {
                        alert("ERROR: 不正な日時フォーマットです。");
                    }
                }
            }
        });


        function checkPassword(inputStr) {
            if (inputStr.length !== ENCRYPTED_PASSWORD.length) return false;
            for (let i = 0; i < inputStr.length; i++) {
                if (inputStr.charCodeAt(i) !== ENCRYPTED_PASSWORD[i]) {
                    return false;
                }
            }
            return true;
        }

        function startAnalysis() {
            const lockScreen = document.getElementById('lock-screen');
            const analyzingScreen = document.getElementById('analyzing-screen');
            const panel = document.getElementById('panel');
            const percentText = document.getElementById('percent-text');
            const scanProgress = document.getElementById('scan-progress');

            lockScreen.classList.remove('active');
            analyzingScreen.classList.add('active');

            document.body.classList.add('analyzing-state');
            panel.classList.add('analyzing-panel');

            let currentPercent = 0;

            function processNextStep() {
                if (currentPercent >= 100) {
                    currentPercent = 100;
                    percentText.textContent = "100%";
                    scanProgress.style.width = "100%";
                    
                    setTimeout(verifyCode, 400);
                    return;
                }

                let progressIncrement = Math.floor(Math.random() * 12);
                if (Math.random() < 0.15) {
                    progressIncrement = Math.floor(Math.random() * 15) + 10;
                }
                let nextDelay = Math.floor(Math.random() * 180) + 40; 
                if (Math.random() < 0.12) {
                    progressIncrement = 0; 
                    nextDelay = Math.floor(Math.random() * 500) + 400; 
                }

                currentPercent += progressIncrement;
                if (currentPercent > 100) currentPercent = 100;

                percentText.textContent = currentPercent + "%";
                scanProgress.style.width = currentPercent + "%";

                setTimeout(processNextStep, nextDelay);
            }

            setTimeout(processNextStep, 100);
        }

        function verifyCode() {
            const passwordInput = document.getElementById('password');
            const input = passwordInput.value;
            
            const analyzingScreen = document.getElementById('analyzing-screen');
            const errorScreen = document.getElementById('error-screen');
            const successScreen = document.getElementById('success-screen');
            const panel = document.getElementById('panel');

            analyzingScreen.classList.remove('active');
            document.body.classList.remove('analyzing-state');
            panel.classList.remove('analyzing-panel');

            if (checkPassword(input)) {
                audioSuccess.currentTime = 0;
                audioSuccess.play().catch(e => console.log("Audio play prevented:", e));

                // === 成功時の処理：ノイズを止め、時計を再稼働 ===
                document.body.classList.remove('time-hacked-state');
                isTimeRunning = true; // 動き出す

                successScreen.classList.add('active');
                document.body.style.backgroundColor = '#003311';
                setTimeout(() => {
                    document.body.style.backgroundColor = '#0a0e14';
                }, 200);
            } else {
                audioError.currentTime = 0;
                audioError.play().catch(e => console.log("Audio play prevented:", e));

                // 失敗時は時空改変ノイズは維持したままエラー状態を重ねる
                errorScreen.classList.add('active');
                document.body.classList.add('error-state');
                panel.classList.add('error-panel');
            }
        }

        function resetSystem() {
            const passwordInput = document.getElementById('password');
            const lockScreen = document.getElementById('lock-screen');
            const errorScreen = document.getElementById('error-screen');
            const panel = document.getElementById('panel');
            const percentText = document.getElementById('percent-text');
            const scanProgress = document.getElementById('scan-progress');

            audioError.pause();
            audioError.currentTime = 0;

            errorScreen.classList.remove('active');
            lockScreen.classList.add('active');
            
            document.body.classList.remove('error-state');
            panel.classList.remove('error-panel');
            
            percentText.textContent = "0%";
            scanProgress.style.width = "0%";

            passwordInput.value = "";
            passwordInput.focus();
        }

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                startAnalysis();
            }
        });
    </script>
</body>
</html>
